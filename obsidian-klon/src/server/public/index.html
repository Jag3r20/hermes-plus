<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOCIYA · Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div id="scanlines"></div>

  <div id="boot">
    <div class="boot-inner">
      <div class="boot-logo">SOCIY<span class="tri">▲</span></div>
      <div class="boot-title" id="boot-title"></div>
      <div class="boot-log" id="boot-log"></div>
      <div class="boot-bar"><span id="boot-bar-fill"></span></div>
    </div>
  </div>

  <div id="auth-overlay" style="display:none">
    <div class="auth-card">
      <div class="auth-logo">SOCIY<span class="tri">▲</span></div>
      <div class="auth-sub" id="auth-sub">// neural vault</div>
      <form id="auth-form" autocomplete="on">
        <input id="auth-user" type="text" placeholder="jméno" autocomplete="username" />
        <input id="auth-pass" type="password" placeholder="heslo" autocomplete="current-password" />
        <input id="auth-pass2" type="password" placeholder="heslo znovu" autocomplete="new-password" style="display:none" />
        <div class="auth-err" id="auth-err"></div>
        <button type="submit" id="auth-submit">přihlásit</button>
      </form>
    </div>
  </div>

  <div id="app">
    <div id="sidebar-backdrop"></div>
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1 class="brand">SOCIY<span class="tri">▲</span></h1>
        <button id="new-note-btn" title="Nová poznámka (Ctrl+N)">
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="brand-sub">// neural vault · v1.0</div>

      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" width="15" height="15"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input id="search" type="search" placeholder="search vault…" />
      </div>

      <div id="search-results"></div>
      <ul id="note-list"></ul>

      <div class="sidebar-footer">
        <div class="status-line">
          <span class="status-dot"></span>
          <span class="status-text">ONLINE</span>
          <span class="count" id="note-count"></span>
          <button id="logout-btn" title="Odhlásit">⏻</button>
        </div>
        <span class="vault-path" id="vault-info"></span>
      </div>
    </aside>

    <main id="main">
      <div id="toolbar">
        <button id="menu-btn" title="Menu">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <span id="note-title">// select a node</span>
        <div class="toolbar-actions">
          <button id="view-btn" class="active">náhled</button>
          <button id="edit-btn">editor</button>
          <button id="graph-btn">soustava</button>
          <button id="save-btn" class="primary" disabled>uložit</button>
        </div>
      </div>

      <div id="content">
        <div id="rendered" class="pane"></div>
        <textarea id="editor" class="pane hidden" spellcheck="false"></textarea>
        <div id="graph-pane" class="pane hidden">
          <div id="graph-hint"></div>
          <div id="type-toggle" class="seg-toggle">
            <button data-type="system">soustava</button>
            <button data-type="network">síť</button>
          </div>
          <div id="view-toggle" class="seg-toggle">
            <button data-dim="2d">2D</button>
            <button data-dim="3d">3D</button>
          </div>
          <div id="graph-legend"></div>
        </div>
      </div>

      <div id="backlinks"></div>
    </main>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://esm.sh/three@0.179.0",
      "three/addons/": "https://esm.sh/three@0.179.0/examples/jsm/",
      "three/examples/jsm/": "https://esm.sh/three@0.179.0/examples/jsm/",
      "three/webgpu": "https://esm.sh/three@0.179.0/webgpu",
      "three/tsl": "https://esm.sh/three@0.179.0/tsl"
    }
  }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked@14/marked.min.js"></script>
  <script type="module" src="/system3d.js"></script>
  <script type="module" src="/network3d.js"></script>
  <script src="/system2d.js"></script>
  <script src="/network2d.js"></script>
  <script src="/bg.js"></script>
  <script src="/app.js"></script>
</body>
</html>
